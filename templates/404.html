{% extends 'base.html' %}

{% block title %}Page Not Found | Flask Notes{% endblock %}

{% block content %}
<!-- Friendly error page for invalid routes -->
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body py-5">
                <h1 class="display-6 fw-bold mb-2">404</h1>
                <p class="lead mb-3">Page not found</p>
                <p class="text-muted">The page you are looking for does not exist or was moved.</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
